<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="4" fill="#1a1a2e"/>

  <!-- Trailer body -->
  <rect x="2" y="8" width="16" height="11" rx="1" fill="#e8710a"/>

  <!-- Cab silhouette (facing right, windshield slants forward) -->
  <polygon points="18,8 18,4 22,4 29,9 29,19 18,19" fill="#e8710a"/>

  <!-- Windshield highlight (subtle glass effect) -->
  <polygon points="19,8 19,5 22.5,5 28,9" fill="#1a1a2e" opacity="0.35"/>

  <!-- Wheels -->
  <circle cx="7"  cy="22" r="3" fill="#e8710a"/>
  <circle cx="14" cy="22" r="3" fill="#e8710a"/>
  <circle cx="24" cy="22" r="3" fill="#e8710a"/>

  <!-- Wheel hubs -->
  <circle cx="7"  cy="22" r="1.3" fill="#1a1a2e"/>
  <circle cx="14" cy="22" r="1.3" fill="#1a1a2e"/>
  <circle cx="24" cy="22" r="1.3" fill="#1a1a2e"/>
</svg>
